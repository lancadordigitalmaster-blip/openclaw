<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf — Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #f2f2f4;
  --surface: #ffffff;
  --sf2:     #f7f7f9;
  --border:  rgba(0,0,0,.07);
  --border2: rgba(0,0,0,.12);
  --wolf:    #ff3b00;
  --wolf-bg: rgba(255,59,0,.06);
  --ink:     #1d1d1f;
  --ink2:    #6e6e73;
  --ink3:    #b0b0b8;
  --jade:    #34c47a;
  --amber:   #f5a623;
  --blue:    #0071e3;
  --red:     #ff3b30;
  --purple:  #8b5cf6;
  --f: 'Geist', -apple-system, sans-serif;
  --m: 'Geist Mono', monospace;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f);
  font-size: 13px;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* TOPBAR */
.top {
  height: 56px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px;
  flex-shrink: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 9px; margin-right: auto; }
.brand-hex {
  width: 28px; height: 28px; background: var(--wolf);
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
.brand-sep  { width: 1px; height: 16px; background: var(--border2); margin: 0 10px; }
.brand-sub  { font-size: 13px; color: var(--ink2); letter-spacing: -.01em; }

.top-r { display: flex; align-items: center; gap: 12px; }
.kpi-group { display: flex; gap: 1px; }
.kpi {
  padding: 4px 12px; background: rgba(0,0,0,.04);
  border: 1px solid var(--border);
  font-size: 12px; display: flex; align-items: baseline; gap: 4px;
}
.kpi:first-child { border-radius: 7px 0 0 7px; }
.kpi:last-child  { border-radius: 0 7px 7px 0; }
.kv { font-weight: 600; font-size: 14px; }
.kl { color: var(--ink3); font-size: 11px; }
.kv.wolf { color: var(--wolf); }

/* PROMPT BAR */
.prompt-bar {
  padding: 10px 24px;
  background: rgba(255,255,255,.7);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; gap: 12px; align-items: center;
}
.prompt-send {
  height: 36px; padding: 0 18px;
  border: none; border-radius: 10px;
  background: var(--wolf); color: #fff;
  font-family: var(--f); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .13s;
  white-space: nowrap; flex-shrink: 0;
}
.prompt-send:hover { background: #e03400; }
.prompt-send:disabled { opacity: .5; cursor: not-allowed; }
.prompt-status {
  font-size: 11px; color: var(--ink3);
  font-family: var(--m); flex: 1;
}
.prompt-status.error { color: var(--red); }
.prompt-status.success { color: var(--jade); }

/* New proposal modal (larger) */
.modal-lg {
  width: 640px; max-width: 96vw;
  max-height: 90vh; display: flex; flex-direction: column;
}
.modal-lg .mb { overflow-y: auto; flex: 1; }
.proposal-text {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border); border-radius: 10px;
  font-family: var(--m); font-size: 11px; color: var(--ink);
  outline: none; background: var(--sf2); margin-bottom: 14px;
  min-height: 200px; max-height: 400px; resize: vertical;
  line-height: 1.6;
}
.proposal-text:focus { border-color: var(--wolf); background: #fff; }
.proposal-text::placeholder { color: var(--ink3); }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* KANBAN */
.kanban {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  overflow: hidden;
}

/* COLUMN */
.col {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.col:last-child { border-right: none; }

.col-head {
  padding: 14px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(255,255,255,.6);
  border-bottom: 1px solid var(--border);
}
.col-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; }
.col-count {
  font-family: var(--m); font-size: 11px; color: var(--ink3);
  background: var(--sf2); border: 1px solid var(--border);
  padding: 1px 7px; border-radius: 10px;
}
.col-total {
  font-family: var(--m); font-size: 10px; color: var(--ink3); margin-left: 6px;
}

.col-body {
  flex: 1; overflow-y: auto;
  padding: 10px 10px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.col-body::-webkit-scrollbar { width: 0; }
.col-body.drag-over {
  background: rgba(255,59,0,.03);
  outline: 2px dashed rgba(255,59,0,.2);
  outline-offset: -4px; border-radius: 8px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: grab;
  overflow: hidden;
  flex-shrink: 0;
  transition: all .18s ease;
  animation: ci .22s ease both;
}
@keyframes ci { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
.card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,.09);
}
.card.dragging { opacity: .4; transform: scale(.95); }

.card-strip { height: 3px; }
.card-strip.c-open { background: linear-gradient(90deg, var(--blue), var(--amber)); }
.card-strip.c-won  { background: linear-gradient(90deg, var(--jade), #6ee7b7); }
.card-strip.c-lost { background: var(--red); opacity: .5; }

.card-inner { padding: 14px 14px 12px; }

.card-row1 {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px;
  margin-bottom: 6px;
}
.card-client {
  font-size: 14px; font-weight: 700;
  letter-spacing: -.03em; line-height: 1.2;
  color: var(--ink);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-amount {
  font-family: var(--m); font-size: 14px;
  font-weight: 700; letter-spacing: -.02em;
  white-space: nowrap; flex-shrink: 0;
}
.card-amount .curr { font-size: 10px; color: var(--ink2); font-weight: 500; margin-right: 1px; }
.card-amount .suf  { font-size: 10px; color: var(--wolf); font-weight: 600; }

.card-service {
  font-size: 11px; color: var(--ink2);
  margin-bottom: 10px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.card-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 10px;
}
.tag {
  font-size: 9px; font-weight: 600; padding: 2px 8px;
  border-radius: 5px; text-transform: uppercase;
  letter-spacing: .04em; display: inline-flex;
  align-items: center; gap: 4px;
}
.tag-seller { background: rgba(139,92,246,.08); color: var(--purple); }
.tag-indicacao { background: rgba(52,196,122,.08); color: #1e8e50; }
.tag-trafego   { background: rgba(0,113,227,.08); color: var(--blue); }
.tag-base      { background: rgba(245,166,35,.08); color: #c68400; }
.tag-outro     { background: rgba(0,0,0,.05); color: var(--ink2); }

.card-notes {
  font-size: 11px; color: var(--ink2);
  padding: 7px 9px; margin-bottom: 10px;
  background: var(--sf2); border-radius: 8px;
  line-height: 1.4; border: 1px solid var(--border);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.card-foot {
  display: flex; align-items: center;
  justify-content: space-between;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.card-date {
  font-family: var(--m); font-size: 10px; color: var(--ink3);
}
.card-foot-r { display: flex; align-items: center; gap: 6px; }
.card-link {
  font-family: var(--m); font-size: 10px;
  color: var(--blue); text-decoration: none;
  padding: 3px 8px; border-radius: 5px;
  background: rgba(0,113,227,.06);
  transition: background .12s;
}
.card-link:hover { background: rgba(0,113,227,.12); }
.card-edit {
  width: 26px; height: 26px; border-radius: 7px;
  border: 1px solid var(--border); background: none;
  cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink3); transition: all .12s;
}
.card-edit:hover { background: rgba(0,0,0,.04); color: var(--ink2); border-color: var(--border2); }

.card-actions {
  display: flex; gap: 5px; margin-top: 10px;
}
.card-btn {
  flex: 1; padding: 7px 6px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  cursor: pointer; font-family: var(--f);
  font-size: 11px; font-weight: 600;
  color: var(--ink2); transition: all .13s; text-align: center;
}
.card-btn:hover { background: rgba(0,0,0,.04); border-color: var(--border2); }
.card-btn.win { background: rgba(52,196,122,.06); border-color: rgba(52,196,122,.18); color: #1e8e50; }
.card-btn.win:hover { background: rgba(52,196,122,.12); }
.card-btn.lose { color: var(--ink3); }
.card-btn.lose:hover { background: rgba(255,59,48,.04); border-color: rgba(255,59,48,.15); color: var(--red); }

.card.won-card { opacity: .75; }
.card.won-card .card-client { color: var(--jade); }
.card.lost-card { opacity: .5; }

.col-empty {
  text-align: center; padding: 40px 16px; color: var(--ink3); font-size: 12px;
}
.col-empty .icon { font-size: 32px; margin-bottom: 8px; opacity: .3; }

/* MODAL */
.ovl {
  position: fixed; inset: 0; background: rgba(0,0,0,.4);
  backdrop-filter: blur(6px); z-index: 200;
  display: none; align-items: center; justify-content: center;
}
.ovl.vis { display: flex; }
.modal {
  background: var(--surface); border-radius: 18px;
  width: 460px; max-width: 94vw;
  box-shadow: 0 24px 80px rgba(0,0,0,.22);
  animation: mfade .2s ease;
}
@keyframes mfade { from { opacity: 0; transform: scale(.96) translateY(8px); } }
.mh {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 15px;
}
.xb {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: rgba(0,0,0,.05); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink2); transition: all .12s;
}
.xb:hover { background: rgba(0,0,0,.1); }
.mb { padding: 22px; }
.mb label { font-size: 11px; font-weight: 600; color: var(--ink2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.fi {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 10px;
  font-family: var(--f); font-size: 13px; color: var(--ink);
  outline: none; background: var(--sf2); margin-bottom: 14px;
}
.fi:focus { border-color: var(--wolf); background: #fff; }
textarea.fi { min-height: 70px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

select.fi {
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
  cursor: pointer;
}

.mf {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}
.btn { font-size: 12px; font-weight: 600; padding: 8px 18px; border-radius: 8px; cursor: pointer; border: none; transition: all .13s; font-family: var(--f); }
.btn-ghost { background: rgba(0,0,0,.05); color: var(--ink); }
.btn-ghost:hover { background: rgba(0,0,0,.1); }
.btn-p { background: var(--wolf); color: #fff; }
.btn-p:hover { background: #e03400; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .kanban { grid-template-columns: 1fr 1fr; }
  .kpi-group { display: none; }
}
@media (max-width: 600px) {
  .kanban { grid-template-columns: 1fr; }
  .top { padding: 0 12px; }
  .prompt-bar { padding: 10px 12px; }

  /* Modal mobile fixes */
  .modal, .modal-lg { max-width: 100vw; width: 100vw; border-radius: 16px 16px 0 0; max-height: 95vh; }
  .ovl.vis { align-items: flex-end; }
  .mb { padding: 16px; }
  .mh { padding: 14px 16px; }
  .mf { padding: 12px 16px; }
  .row2, .row3 { grid-template-columns: 1fr; gap: 0; }
  .proposal-text { min-height: 120px; max-height: 35vh; font-size: 13px; }
  .fi { font-size: 16px; padding: 12px 14px; }
  select.fi { font-size: 16px; }
  .btn { padding: 12px 20px; font-size: 13px; }
  .prompt-send { height: 40px; padding: 0 16px; font-size: 13px; }
  .mb label { font-size: 12px; margin-bottom: 6px; }

  /* Card touch targets */
  .card-edit { width: 34px; height: 34px; }
  .card-btn { padding: 10px 8px; font-size: 12px; }
  .card-link { padding: 6px 12px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="top">
  <div class="brand">
    <div class="brand-hex">W</div>
    <span class="brand-name">Wolf</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Comercial</span>
  </div>
  <div class="top-r">
    <div class="kpi-group">
      <div class="kpi"><span class="kv" id="kpi-total">0</span><span class="kl">propostas</span></div>
      <div class="kpi"><span class="kv kl" id="kpi-open-val">R$ 0</span><span class="kl">pipeline</span></div>
      <div class="kpi"><span class="kv wolf" id="kpi-won-val">R$ 0</span><span class="kl">fechado</span></div>
    </div>
  </div>
</div>

<!-- PROMPT BAR -->
<div class="prompt-bar">
  <button class="prompt-send" id="btn-new-proposal" onclick="openNewProposal()">+ Nova Proposta</button>
  <div class="prompt-status" id="prompt-status"></div>
</div>

<!-- KANBAN -->
<div class="kanban">
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:var(--blue)"></span>Em Aberto</div>
      <div><span class="col-count" id="cnt-open">0</span><span class="col-total" id="tot-open"></span></div>
    </div>
    <div class="col-body" id="col-open" data-status="open"></div>
  </div>
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:var(--jade)"></span>Fechado</div>
      <div><span class="col-count" id="cnt-won">0</span><span class="col-total" id="tot-won"></span></div>
    </div>
    <div class="col-body" id="col-won" data-status="won"></div>
  </div>
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="col-dot" style="background:var(--red)"></span>Perdidas</div>
      <div><span class="col-count" id="cnt-lost">0</span><span class="col-total" id="tot-lost"></span></div>
    </div>
    <div class="col-body" id="col-lost" data-status="lost"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="ovl" id="ovl-edit">
  <div class="modal">
    <div class="mh"><span id="edit-title">Editar</span><button class="xb" onclick="closeEdit()">&#10005;</button></div>
    <div class="mb">
      <div class="row2">
        <div>
          <label>Vendedor</label>
          <select class="fi" id="edit-seller">
            <option value="">Selecione</option>
            <option value="Netto">Netto</option>
            <option value="Gabriela">Gabriela</option>
            <option value="Mariana">Mariana</option>
          </select>
        </div>
        <div>
          <label>Origem</label>
          <select class="fi" id="edit-origin">
            <option value="">Selecione</option>
            <option value="indicacao">Indicacao</option>
            <option value="trafego">Trafego</option>
            <option value="base">Base</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <label>Notas</label>
      <textarea class="fi" id="edit-notes" placeholder="Observacoes sobre a negociacao..."></textarea>
      <div id="edit-lost-wrap" style="display:none">
        <label>Motivo da perda</label>
        <input type="text" class="fi" id="edit-lost-reason" placeholder="Preco, concorrente, timing...">
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" style="color:var(--red);margin-right:auto" onclick="confirmDelete()">Excluir</button>
      <button class="btn btn-ghost" onclick="closeEdit()">Cancelar</button>
      <button class="btn btn-p" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div class="ovl" id="ovl-delete">
  <div class="modal" style="width:400px">
    <div class="mh"><span style="color:var(--red)">Excluir Proposta</span><button class="xb" onclick="closeDelete()">&#10005;</button></div>
    <div class="mb">
      <p style="font-size:13px;color:var(--ink2);margin-bottom:14px">Esta acao nao pode ser desfeita. A proposta sera removida permanentemente.</p>
      <label>Motivo da exclusao</label>
      <input type="text" class="fi" id="delete-reason" placeholder="Ex: duplicada, erro de dados, teste...">
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeDelete()">Cancelar</button>
      <button class="btn btn-p" style="background:var(--red)" onclick="executeDelete()">Confirmar Exclusao</button>
    </div>
  </div>
</div>

<!-- NEW PROPOSAL MODAL -->
<div class="ovl" id="ovl-new">
  <div class="modal modal-lg">
    <div class="mh"><span>Nova Proposta</span><button class="xb" onclick="closeNewProposal()">&#10005;</button></div>
    <div class="mb">
      <div class="row2">
        <div>
          <label>Vendedor (controle kanban)</label>
          <select class="fi" id="new-seller">
            <option value="">Selecione</option>
            <option value="Netto">Netto</option>
            <option value="Gabriela">Gabriela</option>
            <option value="Mariana">Mariana</option>
          </select>
        </div>
        <div>
          <label>Origem (controle kanban)</label>
          <select class="fi" id="new-origin">
            <option value="">Selecione</option>
            <option value="indicacao">Indicacao</option>
            <option value="trafego">Trafego</option>
            <option value="base">Base</option>
            <option value="outro">Outro</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label>WhatsApp do vendedor (para botão "Aceitar proposta")</label>
        <input class="fi" id="new-whatsapp" type="tel" placeholder="5573991484716" style="font-family:var(--font-mono,monospace);letter-spacing:.5px">
      </div>
      <label>Proposta (cole o texto completo, igual WhatsApp)</label>
      <textarea class="proposal-text" id="new-proposal-text" placeholder="Cole aqui o texto da proposta com os slides...

*Slide 1 — Capa*
...

*Slide 12 — Investimento*
R$ 2.000
..."></textarea>
      <div class="prompt-status" id="new-status"></div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeNewProposal()">Cancelar</button>
      <button class="btn btn-p" id="btn-generate" onclick="generateProposal()">Gerar Proposta</button>
    </div>
  </div>
</div>

<script type="module">

let proposals = [];

const ORIGIN_LABELS = { indicacao: 'Indicacao', trafego: 'Trafego', base: 'Base', outro: 'Outro' };

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(v) { return Number(v || 0).toLocaleString('pt-BR'); }
function daysSince(d) { if (!d) return 0; return Math.floor((Date.now() - new Date(d).getTime()) / 86400000); }

async function loadProposals() {
  const { data, error } = await sb.from('proposals').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  proposals = data || [];
  render();
}

function render() {
  Object.values(STATUS_COLS).forEach(id => { document.getElementById(id).innerHTML = ''; });

  const groups = { open: [], won: [], lost: [] };
  proposals.forEach(p => {
    const s = groups[p.status] ? p.status : 'open';
    groups[s].push(p);
  });

  Object.entries(groups).forEach(([status, items]) => {
    const col = document.getElementById(STATUS_COLS[status]);
    document.getElementById(`cnt-${status}`).textContent = items.length;
    const sum = items.reduce((s, p) => s + (Number(p.amount) || 0), 0);
    document.getElementById(`tot-${status}`).textContent = sum > 0 ? ` · R$ ${fmt(sum)}` : '';

    if (items.length === 0) {
      col.innerHTML = `<div class="col-empty"><div class="icon">&#9723;</div>Nenhuma proposta</div>`;
      return;
    }
    items.forEach(p => col.appendChild(createCard(p, status)));
  });

  // KPIs
  document.getElementById('kpi-total').textContent = proposals.length;
  const pipeline = proposals.filter(p => p.status === 'open');
  const won = proposals.filter(p => p.status === 'won');
  document.getElementById('kpi-open-val').textContent = `R$ ${fmt(pipeline.reduce((s,p) => s + (Number(p.amount)||0), 0))}`;
  document.getElementById('kpi-won-val').textContent = `R$ ${fmt(won.reduce((s,p) => s + (Number(p.amount)||0), 0))}`;
}

function createCard(p, status) {
  const card = document.createElement('div');
  card.className = `card${status === 'won' ? ' won-card' : ''}${status === 'lost' ? ' lost-card' : ''}`;
  card.draggable = true;
  card.dataset.id = p.id;

  const date = p.sent_at || p.created_at ? new Date(p.sent_at || p.created_at).toLocaleDateString('pt-BR') : '-';
  const days = daysSince(p.sent_at || p.created_at);
  const daysLabel = days === 0 ? 'hoje' : days === 1 ? '1 dia' : `${days} dias`;
  const amount = p.amount
    ? `<span class="curr">R$</span>${fmt(p.amount)}<span class="suf">${esc(p.suffix || '/mes')}</span>`
    : '';
  const url = p.netlify_url || '';

  let tags = '';
  if (p.seller) tags += `<span class="tag tag-seller">${esc(p.seller)}</span>`;
  if (p.origin) tags += `<span class="tag tag-${p.origin}">${ORIGIN_LABELS[p.origin] || p.origin}</span>`;

  let actions = '';
  if (status === 'open') {
    actions = `<div class="card-actions">
      <button class="card-btn win" onclick="event.stopPropagation();moveStatus('${p.id}','won')">Fechou</button>
      <button class="card-btn lose" onclick="event.stopPropagation();moveStatus('${p.id}','lost')">Perdeu</button>
    </div>`;
  }

  const code = p.proposal_code || '';

  card.innerHTML = `
    <div class="card-strip c-${status}"></div>
    <div class="card-inner">
      <div class="card-row1">
        <div class="card-client">${esc(p.client_name)}</div>
        <div class="card-amount">${amount}</div>
      </div>
      <div class="card-service">${esc(p.service_type || '')}${code ? ` <span style="color:var(--ink3);font-family:var(--m);font-size:9px;margin-left:4px">${esc(code)}</span>` : ''}</div>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      ${p.notes ? `<div class="card-notes">${esc(p.notes)}</div>` : ''}
      <div class="card-foot">
        <span class="card-date">${date} · ${daysLabel}</span>
        <div class="card-foot-r">
          ${url ? `<a class="card-link" href="${esc(url)}" target="_blank" onclick="event.stopPropagation()">Ver proposta</a>` : ''}
          <button class="card-edit" onclick="event.stopPropagation();openEdit('${p.id}')" title="Editar">&#9998;</button>
        </div>
      </div>
      ${actions}
    </div>
  `;

  card.addEventListener('dragstart', (e) => {
    card.classList.add('dragging');
    e.dataTransfer.setData('text/plain', p.id);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.col-body').forEach(c => c.classList.remove('drag-over'));
  });

  return card;
}

// ── DRAG & DROP ──
document.querySelectorAll('.col-body').forEach(col => {
  col.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
  col.addEventListener('drop', async (e) => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const newStatus = col.dataset.status;
    if (!id || !newStatus) return;
    const updates = { status: newStatus };
    if (newStatus === 'won' || newStatus === 'lost') updates.closed_at = new Date().toISOString();
    const { error } = await sb.from('proposals').update(updates).eq('id', id);
    if (!error) await loadProposals();
  });
});

// ── MOVE STATUS ──
window.moveStatus = async function(id, newStatus) {
  const updates = { status: newStatus };
  if (newStatus === 'won' || newStatus === 'lost') updates.closed_at = new Date().toISOString();
  const { error } = await sb.from('proposals').update(updates).eq('id', id);
  if (!error) await loadProposals();
};

// ── NEW PROPOSAL ──
window.openNewProposal = function() {
  document.getElementById('new-seller').value = '';
  document.getElementById('new-origin').value = '';
  document.getElementById('new-whatsapp').value = '';
  document.getElementById('new-proposal-text').value = '';
  document.getElementById('new-status').textContent = '';
  document.getElementById('ovl-new').classList.add('vis');
  document.getElementById('new-proposal-text').focus();
};

window.closeNewProposal = function() {
  document.getElementById('ovl-new').classList.remove('vis');
};

// Generate proposal code: WP-YYYYMMDD-NNN
function genProposalCode() {
  const d = new Date();
  const date = d.toISOString().slice(0,10).replace(/-/g,'');
  const seq = String(proposals.length + 1).padStart(3, '0');
  return `WP-${date}-${seq}`;
}

// ── FULL PARSER: slides text → build_proposal JSON ──
function parseProposalText(text) {
  // Split into slides
  const slideRegex = /\*Slide\s+(\d+)\s*[—–-]\s*([^*]*)\*/g;
  const slidePositions = [];
  let m;
  while ((m = slideRegex.exec(text)) !== null) {
    slidePositions.push({ num: parseInt(m[1]), title: m[2].trim(), start: m.index, headerEnd: m.index + m[0].length });
  }
  const slides = {};
  for (let i = 0; i < slidePositions.length; i++) {
    const s = slidePositions[i];
    const end = i + 1 < slidePositions.length ? slidePositions[i + 1].start : text.length;
    slides[s.num] = { title: s.title, body: text.slice(s.headerEnd, end).trim() };
  }

  const data = {};
  const extractBullets = (txt) => [...txt.matchAll(/[•·]\s*(.+)/g)].map(m => m[1].trim());
  const extractNumbered = (txt) => [...txt.matchAll(/\d+[.)]\s*(.+)/g)].map(m => m[1].trim());
  const extractParas = (txt) => txt.split(/\n\n+/).map(p => p.trim()).filter(p => p && !p.startsWith('*') && !p.match(/^[•·]/));
  const extractLines = (txt) => txt.split('\n').map(l => l.trim()).filter(Boolean);

  // ── Slide 1: Capa → client_name, service_type, year ──
  if (slides[1]) {
    const b = slides[1].body;
    const lines = extractLines(b);
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].match(/Wolf Agency/i)) {
        if (i > 0 && !lines[i-1].match(/Wolf|Apresenta|Comercial/i)) data.client_name = lines[i-1];
        const yearMatch = lines[i].match(/(\d{4})/);
        if (yearMatch) data.year = yearMatch[1];
      }
    }
    const serviceLines = lines.filter(l => !l.match(/Apresenta|Comercial|Wolf Agency|\d{4}/i) && l !== data.client_name);
    if (serviceLines.length >= 2) {
      data.tagline = serviceLines[1];
      data.service_type = serviceLines[1];
    } else if (serviceLines.length >= 1) {
      data.tagline = serviceLines[0];
      data.service_type = serviceLines[0];
    }
  }

  // ── Slide 2: Proposta → context intro ──
  if (slides[2]) {
    const paras = extractParas(slides[2].body);
    const descPara = paras.find(p => p.length > 40);
    if (descPara) {
      data.context = data.context || {};
      data.context.heading = `Quem e\n${data.client_name || 'o cliente'}`;
      data.context.bio_paragraphs = [descPara];
    }
  }

  // ── Slide 3: Contexto → bio_paragraphs + badges ──
  if (slides[3]) {
    const b = slides[3].body;
    const paras = extractParas(b).filter(p => p.length > 20);
    if (paras.length > 0) {
      data.context = data.context || {};
      data.context.heading = data.context.heading || `Sobre\n${data.client_name || 'o projeto'}`;
      data.context.bio_paragraphs = paras;
    }
    // Extract badges from keywords/tags (short lines or items after "Segmento:", "Area:", etc.)
    const badges = [];
    const badgeLines = extractLines(b).filter(l => l.length < 40 && !l.match(/^[•·\d]/) && !paras.includes(l));
    badgeLines.forEach(l => {
      const parts = l.split(/[,|·]/).map(s => s.trim()).filter(s => s.length > 2 && s.length < 35);
      badges.push(...parts);
    });
    if (badges.length > 0) {
      data.context = data.context || {};
      data.context.badges = badges.slice(0, 6);
    }
  }

  // ── Slide 4: Objetivos → context.objectives ──
  if (slides[4]) {
    let objectives = extractBullets(slides[4].body);
    if (objectives.length === 0) objectives = extractNumbered(slides[4].body);
    if (objectives.length === 0) {
      // Try plain lines that look like objectives
      objectives = extractLines(slides[4].body).filter(l => l.length > 15 && !l.match(/^Objetivo/i));
    }
    if (objectives.length > 0) {
      data.context = data.context || {};
      data.context.objectives = objectives;
    }
  }

  // ── Slides 5-10: Servicos + ticker_items ──
  const services = [];
  const tickerItems = [];
  for (let n = 5; n <= 10; n++) {
    if (!slides[n]) continue;
    const b = slides[n].body;
    const bullets = extractBullets(b);
    if (bullets.length === 0) continue;
    const firstLine = extractLines(b).find(l => !l.match(/^[•·]/) && !l.match(/^Inclui|^Entrega/i));
    const name = firstLine || slides[n].title;
    const tagMatch = b.match(/(\d+)\s*(criativos|posts|stories|videos|reels)/i);
    const tag = tagMatch ? `${tagMatch[1]} ${tagMatch[2]}/mes` : '';
    services.push({ name, tag, bullets });
    tickerItems.push(name);
  }
  if (services.length > 0) data.services = services;
  // Add extra ticker items from service type/tagline
  if (data.service_type) tickerItems.push(data.service_type);
  if (data.client_name) tickerItems.push(data.client_name);
  if (tickerItems.length > 0) data.ticker_items = tickerItems;

  // ── Slide 11: Entregaveis → deliverables ──
  if (slides[11]) {
    const b = slides[11].body;
    const bullets = extractBullets(b);
    const numbered = extractNumbered(b);
    const items = bullets.length > 0 ? bullets : numbered;
    if (items.length > 0) {
      // Try to split into onboarding vs recurrent
      const onboarding = [];
      const recurrent = [];
      items.forEach(item => {
        if (item.match(/onboarding|inicial|primeiro|setup|diagnostico|briefing|1[oº]\s*m[eê]s/i)) {
          onboarding.push(item);
        } else {
          recurrent.push(item);
        }
      });
      const groups = [];
      if (onboarding.length > 0) {
        groups.push({
          badge: 'Onboarding',
          title: 'Estruturacao inicial',
          rows: onboarding.map(bl => {
            const parts = bl.split(/\s*[-–—:]\s*/);
            return parts.length >= 2
              ? { label: parts[0], value: parts.slice(1).join(' ') }
              : { label: bl, value: 'Incluso' };
          }),
        });
      }
      groups.push({
        badge: 'Mensal',
        title: 'Recorrente',
        highlight: true,
        rows: (recurrent.length > 0 ? recurrent : items).map(bl => {
          const parts = bl.split(/\s*[-–—:]\s*/);
          if (parts.length >= 2) return { label: parts[0], value: parts.slice(1).join(' ') };
          // Try to extract quantity
          const qtyMatch = bl.match(/^(\d+)\s+(.+)/);
          if (qtyMatch) return { label: qtyMatch[2], value: qtyMatch[1], accent: true };
          return { label: bl, value: 'Incluso' };
        }),
      });
      data.deliverables = groups;
    }
  }

  // ── Slide 12: Investimento ──
  if (slides[12]) {
    const b = slides[12].body;
    const amountMatch = b.match(/R\$\s*([\d.,]+)/);
    if (amountMatch) {
      // Parse payment options from text
      const payOpts = [];
      if (b.match(/pix/i)) payOpts.push({ title: 'PIX', desc: 'Pagamento a vista sem acrescimo.', highlight: true });
      if (b.match(/ted|doc|transfer[eê]ncia/i)) payOpts.push({ title: 'Transferencia Bancaria', desc: 'TED ou DOC.' });
      if (b.match(/cart[aã]o|parcel/i)) payOpts.push({ title: 'Cartao', desc: 'Parcelamento disponivel.' });
      if (b.match(/boleto/i)) payOpts.push({ title: 'Boleto', desc: 'Boleto bancario.' });
      if (payOpts.length === 0) {
        payOpts.push({ title: 'PIX', desc: 'Pagamento a vista sem acrescimo.', highlight: true });
        payOpts.push({ title: 'Transferencia Bancaria', desc: 'TED ou DOC.' });
      }
      data.investment = {
        currency: 'R$',
        amount: amountMatch[1],
        suffix: '/mes',
        payment_options: payOpts,
      };
    }
  }

  // ── Slide 12 or dedicated: Support items ──
  // Look for support in slide 12, or a slide with "Suporte" in title
  const supportSlide = Object.entries(slides).find(([n, s]) => s.title.match(/suporte|acompanhamento/i));
  if (supportSlide) {
    const bullets = extractBullets(supportSlide[1].body);
    const numbered = extractNumbered(supportSlide[1].body);
    const items = bullets.length > 0 ? bullets : numbered;
    if (items.length > 0) data.support = items;
  }
  if (!data.support && slides[12]) {
    const b = slides[12].body;
    const incluiIdx = b.search(/Inclui|Suporte|Acompanhamento/i);
    if (incluiIdx !== -1) {
      const afterInclui = b.slice(incluiIdx);
      const bullets = extractBullets(afterInclui);
      const lines = extractLines(afterInclui).filter(l => !l.match(/^Inclui|^Investimento|^R\$/i) && l.length > 10);
      data.support = bullets.length > 0 ? bullets : lines;
    }
  }
  // Default support if none found
  if (!data.support || data.support.length === 0) {
    data.support = [
      'Reuniao mensal de alinhamento e resultados',
      'Suporte via WhatsApp em horario comercial',
      'Relatorio mensal de desempenho',
      'Ajustes e otimizacoes continuas',
      'Canal direto com a equipe Wolf',
    ];
  }

  // ── Slide 13: Fechamento ──
  if (slides[13]) {
    const paras = extractParas(slides[13].body);
    const allLines = extractLines(slides[13].body);
    data.close = {
      heading: paras[0] || 'Vamos transformar\nsua presenca digital.',
      body: paras[1] || 'Esta proposta foi desenvolvida exclusivamente para o seu projeto.',
      cta_text: 'Falar com a Wolf',
    };
  }

  // Defaults
  if (!data.year) data.year = new Date().getFullYear().toString();
  if (!data.whatsapp) data.whatsapp = '5573991484716';
  if (!data.close) data.close = { heading: 'Vamos transformar\nsua presenca digital.', body: 'Pronto para comecar?', cta_text: 'Falar com a Wolf' };
  if (!data.tagline) data.tagline = 'Presenca digital que gera resultado.';

  return data;
}

window.generateProposal = async function() {
  const seller = document.getElementById('new-seller').value;
  const origin = document.getElementById('new-origin').value;
  const whatsapp = document.getElementById('new-whatsapp').value.trim().replace(/\D/g, '') || undefined;
  const proposalText = document.getElementById('new-proposal-text').value.trim();
  const statusEl = document.getElementById('new-status');
  const btn = document.getElementById('btn-generate');

  if (!proposalText) { statusEl.textContent = 'Cole o texto da proposta'; statusEl.className = 'prompt-status error'; return; }
  if (proposalText.length < 100) { statusEl.textContent = 'Texto muito curto. Cole a proposta completa com os slides.'; statusEl.className = 'prompt-status error'; return; }

  const code = genProposalCode();

  btn.disabled = true;
  btn.textContent = 'Gerando...';
  statusEl.textContent = `[${code}] Enviando para o Alfred interpretar...`;
  statusEl.className = 'prompt-status';

  try {
    // Send raw text to bridge — Claude parses + builds (same quality as WhatsApp)
    const parseEndpoint = isLocal ? `${BRIDGE_API}/parse-proposal` : `/api/parse-proposal`;
    const res = await fetch(parseEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: proposalText,
        seller: seller || undefined,
        origin: origin || undefined,
        proposal_code: code,
        whatsapp: whatsapp || undefined,
      }),
    });
    const raw = await res.text();
    let result = {};
    try {
      result = raw ? JSON.parse(raw) : {};
    } catch (parseErr) {
      throw new Error(`Resposta invalida do servidor (HTTP ${res.status})`);
    }

    if (!res.ok) {
      throw new Error(result.error || result.message || `HTTP ${res.status}`);
    }

    if (result.ok) {
      const clientName = result.parsed_data?.client_name || 'Cliente';

      // Extract proposal ID from bridge response (if returned)
      const idMatch = result.message && result.message.match(/ID:\s*([a-f0-9-]+)/);
      const proposalId = idMatch ? idMatch[1] : null;

      // Update seller/origin/code — use ID if available, fallback to name search
      setTimeout(async () => {
        await loadProposals();
        let targetId = proposalId;
        if (!targetId) {
          const newest = proposals.find(p => p.client_name === clientName);
          targetId = newest ? newest.id : null;
        }
        if (targetId) {
          const updates = {};
          if (code) updates.proposal_code = code;
          if (seller) updates.seller = seller;
          if (origin) updates.origin = origin;
          if (Object.keys(updates).length > 0) {
            await sb.from('proposals').update(updates).eq('id', targetId);
          }
          await loadProposals();
        }
      }, 1500);

      statusEl.textContent = `[${code}] Proposta gerada! ${result.url || ''}`;
      statusEl.className = 'prompt-status success';
      document.getElementById('prompt-status').textContent = `[${code}] ${clientName} gerada`;
      document.getElementById('prompt-status').className = 'prompt-status success';
      setTimeout(() => closeNewProposal(), 2500);
    } else {
      statusEl.textContent = `[${code}] ${result.error || result.message || 'Erro ao gerar proposta'}`;
      statusEl.className = 'prompt-status error';
    }
  } catch (err) {
    const hint = isLocal
      ? 'Verifique se o bridge local esta ligado.'
      : 'Confira os logs da funcao /api/parse-proposal na Vercel.';
    statusEl.textContent = `Erro ao gerar: ${err.message}. ${hint}`;
    statusEl.className = 'prompt-status error';
  }

  btn.disabled = false;
  btn.textContent = 'Gerar Proposta';
};

// ── EDIT ──
window.openEdit = function(id) {
  editingId = id;
  const p = proposals.find(x => x.id === id);
  if (!p) return;
  document.getElementById('edit-title').textContent = p.client_name;
  document.getElementById('edit-seller').value = p.seller || '';
  document.getElementById('edit-origin').value = p.origin || '';
  document.getElementById('edit-notes').value = p.notes || '';
  document.getElementById('edit-lost-reason').value = p.lost_reason || '';
  document.getElementById('edit-lost-wrap').style.display = p.status === 'lost' ? 'block' : 'none';
  document.getElementById('ovl-edit').classList.add('vis');
};

window.closeEdit = function() {
  document.getElementById('ovl-edit').classList.remove('vis');
  editingId = null;
};

// ── DELETE ──
window.confirmDelete = function() {
  document.getElementById('delete-reason').value = '';
  document.getElementById('ovl-delete').classList.add('vis');
};

window.closeDelete = function() {
  document.getElementById('ovl-delete').classList.remove('vis');
};

window.executeDelete = async function() {
  if (!editingId) return;
  const reason = document.getElementById('delete-reason').value.trim();
  if (!reason) { alert('Informe o motivo da exclusao'); return; }
  console.log(`[DELETE] Proposal ${editingId} — reason: ${reason}`);
  // Save reason as lost_reason before deleting
  await sb.from('proposals').update({ lost_reason: reason }).eq('id', editingId);
  const { error } = await sb.from('proposals').delete().eq('id', editingId);
  if (error) { alert('Erro: ' + error.message); return; }
  closeDelete();
  closeEdit();
  await loadProposals();
};

window.saveEdit = async function() {
  if (!editingId) return;
  const updates = {
    seller: document.getElementById('edit-seller').value || null,
    origin: document.getElementById('edit-origin').value || null,
    notes: document.getElementById('edit-notes').value.trim() || null,
    lost_reason: document.getElementById('edit-lost-reason').value.trim() || null,
  };
  const { error } = await sb.from('proposals').update(updates).eq('id', editingId);
  if (error) { alert('Erro: ' + error.message); return; }
  closeEdit();
  await loadProposals();
};

// ── REALTIME ──
sb.channel('proposals-rt')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'proposals' }, () => loadProposals())
  .subscribe((status) => {
    if (status === 'CHANNEL_ERROR') console.warn('[RT] Erro na conexao realtime — kanban pode estar desatualizado');
    if (status === 'TIMED_OUT') console.warn('[RT] Timeout na conexao realtime');
  });

// ── INIT ──
loadProposals();
</script>
